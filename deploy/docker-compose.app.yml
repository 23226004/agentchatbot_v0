# conversation-store 백엔드 앱 서비스 (G4 — 검증된 시스템의 컨테이너 배포).
#
# 인프라 compose 와 **함께**(병합) 띄운다 → 같은 프로젝트·네트워크라 서비스명 DNS 로 서로 도달:
#   docker compose \
#     -f deploy/docker-compose.yml \            # qdrant + fuseki (법령 검색)
#     -f deploy/docker-compose.convstore.yml \  # convstore-postgres (대화 저장)
#     -f deploy/docker-compose.app.yml \        # app (이 파일)
#     --env-file deploy/.env up -d --build
#
# 비밀(LLM 키·법령 API·Langfuse)은 deploy/.env 로만 주입 — 이미지엔 굽지 않는다(.dockerignore).
# 임베딩/LLM 은 원격(Tailscale 100.x)이라 컨테이너가 호스트 NAT 로 도달(.env 값 그대로).

services:
  app:
    build:
      context: ..                     # repo 루트(형제 패키지 포함)
      dockerfile: backend/Dockerfile
    image: convstore-backend:latest
    container_name: convstore-backend
    depends_on:
      convstore-postgres:             # 하드 의존: lifespan 마이그레이션이 부팅 시 DB 필요
        condition: service_healthy
    # 컨테이너 내부 → 인프라는 **서비스명**으로(localhost 아님). .env 의 호스트값을 오버라이드.
    environment:
      DATABASE_URL: postgresql://convstore:${CONVSTORE_PG_PASSWORD:-convstore}@convstore-postgres:5432/convstore
      QDRANT_URL: http://qdrant:6333
      FUSEKI_URL: http://fuseki:3030
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5180}
      REQUIRE_APPROVAL: ${REQUIRE_APPROVAL:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # ★ 이미지엔 torch/FlagEmbedding 없음(경량 437MB) → 임베딩은 **원격 서버**, 리랭커 끔. 미설정 시
      #   search_legal 이 ModuleNotFoundError("일시적 오류" 마스킹) 로 실패한다. EMBEDDING_URL 은 .env 로.
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-remote}
      RERANK: ${RERANK:-0}
    # 비밀·원격 URL(LLM/임베딩/법령 API/Langfuse)은 .env 에서. 없으면 앱이 첫 LLM 사용 시 명확히 실패.
    env_file:
      - path: .env
        required: false
    ports:
      - "${APP_PORT:-8000}:8000"
    # readiness = GET /stats(DB 풀+상태 집계 200). 부팅 마이그레이션 동안 실패는 start_period(40s) 가 유예
    # (retries 에 미산입). 그 후 3연속 실패(~30s)면 unhealthy — 일시 DB 블립(<30s)은 무시, 빠른 감지 균형.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/stats', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
